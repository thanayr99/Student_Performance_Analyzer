services:
  - type: web
    name: student-performance-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /actuator/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: student-performance-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FLASK_PREDICTION_ENABLED
        value: "false"
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false

  - type: web
    name: student-performance-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_USE_MOCK
        value: "false"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: student-performance-db
    plan: free
    databaseName: student_performance
    user: student_user
