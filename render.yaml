services:
  - type: pserv
    name: mysql
    runtime: docker
    plan: starter
    dockerfilePath: ./database/mysql.Dockerfile
    dockerContext: .
    envVars:
      - key: MYSQL_DATABASE
        value: student_performance
      - key: MYSQL_USER
        value: student_user
      - key: MYSQL_PASSWORD
        sync: false
      - key: MYSQL_ROOT_PASSWORD
        sync: false
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 10

  - type: pserv
    name: ml-service
    runtime: docker
    plan: starter
    dockerfilePath: ./ml-service/Dockerfile
    dockerContext: ./ml-service

  - type: web
    name: student-performance-backend
    runtime: docker
    plan: starter
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /actuator/health
    envVars:
      - key: DB_URL
        value: jdbc:mysql://mysql:3306/student_performance?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      - key: DB_USERNAME
        value: student_user
      - key: DB_PASSWORD
        fromService:
          type: pserv
          name: mysql
          envVarKey: MYSQL_PASSWORD
      - key: JWT_SECRET
        generateValue: true
      - key: FLASK_PREDICTION_ENABLED
        value: "false"
      - key: FLASK_PREDICTION_URL
        value: http://ml-service:5000/predict
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false

  - type: web
    name: student-performance-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_USE_MOCK
        value: "false"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
